name: Ping Render Backend

on:
  schedule:
    # Runs every 14 minutes to prevent Render's free tier from sleeping (which happens after 15 mins)
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: curl -s https://wbs-finalproject.onrender.com/healthz > /dev/null || true
